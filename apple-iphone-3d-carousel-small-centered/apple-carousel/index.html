<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Apple 3D Carousel</title><link rel='stylesheet' href='style.css'></head><body>
<canvas id='bg'></canvas>
<main class='shell'>
  <div class='eyebrow'>Designed for iPhone</div>
  <h1 id='modelName'>iPhone 17</h1>
  <p id='modelMeta'>A19 · 6.3-inch display</p>
  <section class='stage' id='stage'>
    <div class='track' id='track'></div>
  </section>
  <div class='nav'><button id='prev' aria-label='Previous'>←</button><div id='dots'></div><button id='next' aria-label='Next'>→</button></div>
  <small>Scroll, drag, swipe, or click a card</small>
</main>
<script src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js'></script><script src='script.js'></script></body></html>
